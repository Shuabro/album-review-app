  <!-- Next Review at the top -->
  <section class="next-review-section">
    <h2>Next Review</h2>
    <mat-card class="next-review-card big-next-review">
      <div class="next-review-row">
        <div class="next-review-img-container">
          <img [src]="nextReview.cover" alt="Album cover" />
        </div>
        <div class="next-review-details">
          <div class="album-title">{{ nextReview.title }}</div>
          <div class="album-artist">{{ nextReview.artist }}</div>
          <div class="album-rating">
            <mat-icon>star</mat-icon> {{ nextReview.rating }}
          </div>
          <div class="review-date">Review on {{ nextReview.reviewDate }}</div>
        </div>
      </div>
    </mat-card>
  </section>

  <!-- Recently Reviewed below Next Review -->
  <section class="recently-reviewed-section">
    <h2>Recently Reviewed</h2>
    <div class="recently-reviewed-list">
      <mat-card *ngFor="let album of recentlyReviewed" class="album-card">
        <img mat-card-image [src]="album.cover" alt="Album cover" />
        <mat-card-content>
          <div class="album-title">{{ album.title }}</div>
          <div class="album-artist">{{ album.artist }}</div>
          <div class="album-rating">
            <mat-icon>star</mat-icon> {{ album.rating }}
          </div>
        </mat-card-content>
      </mat-card>
    </div>
  </section>
</div>
